name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-rust:
    name: Test Rust Core & Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Tests
        run: cargo test --verbose
      - name: Check Examples
        run: cargo check --examples

  test-python-bindings:
    name: Test Python Bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install maturin
        run: pip install maturin
      - name: Build and Test Bindings
        run: |
          cd py
          cargo test --verbose
          maturin develop
          python3 tests/test_bindings.py

  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: cargo fmt --all -- --check
      - run: cargo clippy -- -D warnings
      - run: cd py && cargo fmt --all -- --check
      - run: cd py && cargo clippy -- -D warnings
